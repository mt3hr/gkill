<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记事本 - 帮助</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 16px; line-height: 1.8; max-width: 680px; margin: 0 auto; color: #333; }
    h1 { font-size: 1.3em; border-bottom: 2px solid #1976D2; padding-bottom: 8px; color: #1976D2; }
    h2 { font-size: 1.1em; margin-top: 1.5em; color: #444; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.95em; }
    th { background: #f5f5f5; }
    .icon { font-size: 1.2em; }
    .tip { background: #E3F2FD; border-left: 4px solid #1976D2; padding: 8px 12px; margin: 12px 0; font-size: 0.9em; }
    body.dark { background: #212121; color: #e0e0e0; }
    body.dark h1 { color: #64B5F6; border-bottom-color: #64B5F6; }
    body.dark h2 { color: #bbb; }
    body.dark h3 { color: #aaa; }
    body.dark table th { background: #333; }
    body.dark table th, body.dark table td { border-color: #444; }
    body.dark .tip { background: #1a2733; border-left-color: #64B5F6; }
    body.dark code { background: #333; }
    body.dark pre { background: #2a2a2a; }
    body.dark a { color: #64B5F6; }
    body.dark .back-link a { color: #64B5F6; }
  </style>
</head>
<body>
  <h1>记事本</h1>
  <p>通过记事本语法记录生活事件的记事本界面。记事本语法是一种行结构化的文本格式，可以批量输入各种记录。</p>

  <h2>工具栏按钮</h2>
  <table>
    <tr>
      <th>按钮</th>
      <th>说明</th>
    </tr>
    <tr>
      <td><span class="icon">&#9881;</span> 设置</td>
      <td>打开应用程序设置界面。</td>
    </tr>
  </table>

  <h2>界面元素</h2>
  <table>
    <tr>
      <th>元素</th>
      <th>说明</th>
    </tr>
    <tr>
      <td>文本输入区域</td>
      <td>使用记事本语法输入记录内容的区域。</td>
    </tr>
    <tr>
      <td>模板按钮</td>
      <td>插入预定义的记事本模板文本。</td>
    </tr>
    <tr>
      <td>保存按钮</td>
      <td>点击保存按钮，解析并保存输入的记事本文本。</td>
    </tr>
  </table>

  <h2>关于记事本语法</h2>
  <p>记事本语法是gkill独有的文本格式，可以在一个文本中批量创建多条记录。每行代表一个指令或数据条目。</p>

  <div class="tip">
    <strong>提示：</strong>使用模板按钮可以快速插入常用的输入格式，无需记忆记事本语法。
  </div>

  <h2>相关文档</h2><p><a href="kftl-syntax.html">记事本语法参考 →</a></p>
<script>(function(){var t=new URLSearchParams(location.search).get('theme');if(t==='dark'){document.body.classList.add('dark');document.querySelectorAll('a[href]').forEach(function(a){var h=a.getAttribute('href');if(h&&!h.startsWith('http')&&!h.startsWith('#')&&h.indexOf('?')===-1){a.setAttribute('href',h+'?theme=dark')}})}})()</script>
</body>
</html>
