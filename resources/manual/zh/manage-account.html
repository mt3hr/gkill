<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户管理 - 帮助</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; padding: 16px; line-height: 1.8; max-width: 680px; margin: 0 auto; color: #333; }
    h1 { font-size: 1.3em; border-bottom: 2px solid #1976D2; padding-bottom: 8px; color: #1976D2; }
    h2 { font-size: 1.1em; margin-top: 1.5em; color: #444; }
    table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 0.95em; }
    th { background: #f5f5f5; }
    .tip { background: #E3F2FD; border-left: 4px solid #1976D2; padding: 8px 12px; margin: 12px 0; font-size: 0.9em; }
    body.dark { background: #212121; color: #e0e0e0; }
    body.dark h1 { color: #64B5F6; border-bottom-color: #64B5F6; }
    body.dark h2 { color: #bbb; }
    body.dark h3 { color: #aaa; }
    body.dark table th { background: #333; }
    body.dark table th, body.dark table td { border-color: #444; }
    body.dark .tip { background: #1a2733; border-left-color: #64B5F6; }
    body.dark code { background: #333; }
    body.dark pre { background: #2a2a2a; }
    body.dark a { color: #64B5F6; }
    body.dark .back-link a { color: #64B5F6; }
    .breadcrumb { font-size: 0.85em; margin-bottom: 12px; color: #666; }
    .breadcrumb a { color: #1976D2; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    body.dark .breadcrumb { color: #999; }
    body.dark .breadcrumb a { color: #64B5F6; }
    /* scrollbar (gkill theme) */
    *::-webkit-scrollbar { width: 8px; height: 8px; }
    *::-webkit-scrollbar-thumb { background: #1976D2; width: 6px; border-radius: 5px; }
    body.dark *::-webkit-scrollbar-thumb { background: #64B5F6; }
  </style>
</head>
<body>
  <nav class="breadcrumb"><a href="getting-started.html">入门指南</a> &gt; <span>账户管理</span></nav>
  <h1>账户管理</h1>
  <p>此画面用于管理用户账户。仅管理员可以访问。</p>

  <h2>顶部按钮</h2>
  <p>点击<strong>添加账户</strong>按钮可创建新账户。</p>

  <h2>账户列表</h2>
  <p>已注册的账户以列表形式显示。每个账户行包含以下项目：</p>
  <table>
    <tr><th>项目</th><th>说明</th></tr>
    <tr><td>启用/禁用复选框</td><td>切换账户的启用和禁用状态</td></tr>
    <tr><td>用户ID</td><td>显示账户的用户ID</td></tr>
    <tr><td>存储分配按钮</td><td>为用户分配数据仓库</td></tr>
    <tr><td>密码重置按钮</td><td>生成密码重置链接</td></tr>
  </table>

  <h2>底部按钮</h2>
  <p><strong>关闭</strong>: 关闭账户管理画面。</p>

  <div class="tip">
    <strong>提示:</strong> <code>admin</code> 账户在服务器首次启动时自动创建。通过账户管理页面添加的账户为普通用户（无管理员权限）。账户通过启用/禁用进行管理，而非删除。
  </div>
  <h2>相关文档</h2>
  <ul>
    <li><a href="server-config.html">服务器设置</a></li>
    <li><a href="application-config.html">设置</a></li>
  </ul>
<script>(function(){var t=new URLSearchParams(location.search).get('theme');if(t==='dark'){document.body.classList.add('dark');document.querySelectorAll('a[href]').forEach(function(a){var h=a.getAttribute('href');if(h&&!h.startsWith('http')&&!h.startsWith('#')&&h.indexOf('?')===-1){a.setAttribute('href',h+'?theme=dark')}})}})()</script>
</body>
</html>
